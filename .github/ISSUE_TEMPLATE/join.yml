name: Request to join a wigamig centre
description: Ask a wigamig-enabled institution to admit you as a lab, core, or PI.
title: "[join] <institution> — <your proposed unit name>"
labels: ["join-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in wigamig. This form starts a join
        request. **Do not include anything private here** — no netname,
        no server hostnames, no data paths, no tokens. The centre's
        registrar will follow up privately (over Slack) to collect those.
  - type: input
    id: institution
    attributes:
      label: Institution
      description: >-
        The wigamig centre you want to join, by its public unique name
        (the `unique_name` in that centre's directory row, e.g. `exampleu`).
      placeholder: exampleu
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What are you requesting?
      options:
        - "lab — start a new lab (you are the PI)"
        - "core — start a new shared facility / core (you are the lead)"
        - "pi — register as a PI (record intent; lab follows separately)"
        - "member — join an existing lab (routed to that lab's PI)"
    validations:
      required: true
  - type: input
    id: proposed_name
    attributes:
      label: Proposed name
      description: Short name for the lab / core (snake_case), or the existing lab you want to join.
      placeholder: my_lab
    validations:
      required: true
  - type: input
    id: pi_handle
    attributes:
      label: PI / lead handle
      description: >-
        The @handle of the PI or core lead. For a member request, the PI
        of the lab you want to join.
      placeholder: "@api"
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: A sentence or two on who you are and why you're joining. No sensitive details.
    validations:
      required: true
  - type: checkboxes
    id: privacy_ack
    attributes:
      label: Privacy acknowledgement
      options:
        - label: I have not included any netname, server path, or credential in this issue.
          required: true
